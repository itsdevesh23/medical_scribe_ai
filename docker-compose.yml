version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: medicalscribe
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_storage:/root/.ollama

  ollama-pull:
    image: curlimages/curl:latest
    command: >
      sh -c "
      echo 'Waiting for Ollama to start...' &&
      sleep 10 &&
      echo 'Pulling phi3:mini model...' &&
      curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"phi3:mini\"}'
      "
    depends_on:
      - ollama

  backend:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./models:/app/models
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ~/.cache/whisper:/root/.cache/whisper
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/medicalscribe
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_HOST=http://ollama:11434
      - HF_TOKEN=${HF_TOKEN}
    depends_on:
      - db
      - redis
      - ollama

  worker:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    command: ["python", "-m", "celery", "-A", "backend.tasks", "worker", "--loglevel=info", "-P", "gevent"]
    volumes:
      - ./storage:/app/storage
      - ./models:/app/models
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ~/.cache/whisper:/root/.cache/whisper
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/medicalscribe
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_HOST=http://ollama:11434
      - HF_TOKEN=${HF_TOKEN}
    depends_on:
      - db
      - redis
      - ollama

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  postgres_data:
  redis_data:
  ollama_data:
